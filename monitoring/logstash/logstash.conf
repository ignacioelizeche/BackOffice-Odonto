input {
  # Recibir logs JSON via UDP
  udp {
    port => 5000
    codec => json
    type => "json"
  }

  # Recibir logs via TCP
  tcp {
    port => 5000
    codec => json
    type => "json"
  }

  # Logs de Docker (si está disponible)
  # beats {
  #   port => 5044
  # }
}

filter {
  # Parse JSON logs
  if [type] == "json" {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Agregar timestamp standar
  if [parsed][timestamp] {
    date {
      match => [ "[parsed][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Agregar hostname
  mutate {
    add_field => { "host_name" => "${HOSTNAME:unknown}" }
    add_field => { "environment" => "${ENVIRONMENT:development}" }
  }

  # Enriquecer logs con información adicional
  if [parsed][level] {
    mutate {
      rename => { "[parsed][level]" => "log_level" }
    }
  }

  if [parsed][service] {
    mutate {
      rename => { "[parsed][service]" => "service" }
    }
  }

  # Detectar errores críticos
  if [log_level] =~ /ERROR|CRITICAL/ {
    mutate {
      add_tag => [ "error" ]
    }
  }
}

output {
  # Enviar a Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    codec => json
  }

  # También enviar a stdout para debugging (comentar en producción)
  # stdout {
  #   codec => rubydebug
  # }

  # Alertas en stderr
  if "error" in [tags] {
    stderr {
      codec => line { format => "[%{log_level}] %{service}: %{message}" }
    }
  }
}
