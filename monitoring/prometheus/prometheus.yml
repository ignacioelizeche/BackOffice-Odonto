global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'backoffice-odonto'

# Alertas
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Cargar reglas de alertas
rule_files:
  - 'alert_rules.yml'

# Targets a monitorear
scrape_configs:
  # Backend FastAPI
  - job_name: 'backoffice-backend'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']

  # Node Exporter (Sistema)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 10s

  # Docker Containers
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s
