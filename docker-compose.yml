version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: backoffice_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backoffice_odonto}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backoffice_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backoffice_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-backoffice_odonto}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:400184433,http://192.168.2.113:8443}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.2.113}
      N8N_CREATE_DOCTOR_CALENDAR_WEBHOOK_URL: ${N8N_CREATE_DOCTOR_CALENDAR_WEBHOOK_URL:-https://rpa.agilapps.com/webhook/ad2d293d-c2b6-42ad-bed2-ce6f76e61989}
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - backoffice_network
    restart: unless-stopped

  # Frontend App
  frontend:
    build:
      context: ./frontend/dental-back-office
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
        BASE_PATH: ${BASE_PATH:-/agildent}
    container_name: backoffice_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      BASE_PATH: ${BASE_PATH:-/agildent}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "8443:3000"
    depends_on:
      - backend
    networks:
      - backoffice_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  backoffice_network:
    driver: bridge
