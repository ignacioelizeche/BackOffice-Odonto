# Nginx Configuration for AgilDent
# Reverse proxy for frontend and backend

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name agilapps.com *.agilapps.com;

    # Allow Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Configuration
server {
    listen 443 ssl http2;
    server_name agilapps.com *.agilapps.com;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/agilapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agilapps.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # AgilDent Frontend and Backend
    location /agildent/ {
        # Proxy to frontend (preserve /agildent path - Next.js has basePath=/agildent)
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        # Headers for proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings for streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # API Routes - Forward to Backend
    location /agildent/api/ {
        # Proxy to backend (FastAPI)
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;

        # Headers for proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Important for API endpoints
        proxy_set_header X-Forwarded-Path /agildent/api;

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # For file uploads
        client_max_body_size 50M;
    }

    # Health check endpoints (internal)
    location /health {
        access_log off;
        proxy_pass http://backend:8000/health;
    }

    # Root path - redirect to /agildent
    location = / {
        return 301 https://$server_name/agildent/;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
