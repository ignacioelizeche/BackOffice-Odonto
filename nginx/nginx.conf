events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # API ROUTES (debe ir ANTES del frontend)
        location /agildent/api/ {
            proxy_pass http://192.168.2.56:8080/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            client_max_body_size 50M;
        }

        # FRONTEND - Next.js con basePath=/agildent
        # NO stripear /agildent - pasar completo al frontend
        location /agildent/ {
            proxy_pass http://192.168.2.56:3000/agildent/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering off;
        }

        # Redirect root to /agildent/
        location = / {
            return 301 /agildent/;
        }

        # Health check
        location /health {
            proxy_pass http://192.168.2.56:8080/health;
        }
    }
}
