events {
    worker_connections 1024;
}

http {
    # Configuration para AgilDent con basePath=/agildent
    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # ======================================
        # FRONTEND ROUTES - Next.js en puerto 3000
        # Proxea a: http://192.168.2.56:3000
        # ======================================
        location /agildent/ {
            # Strip /agildent y proxea a raíz del frontend
            # Next.js ya tiene basePath=/agildent configurado
            proxy_pass http://192.168.2.56:3000/;
            proxy_http_version 1.1;

            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ======================================
        # API ROUTES - FastAPI en puerto 8080
        # Proxea a: http://192.168.2.56:8080
        # ======================================
        location /agildent/api/ {
            # Strip /agildent/api y proxea a /api del backend
            proxy_pass http://192.168.2.56:8080/api/;
            proxy_http_version 1.1;

            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Path /agildent/api;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts (más largos para uploads)
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # File uploads
            client_max_body_size 50M;
        }

        # ======================================
        # HEALTH CHECK
        # ======================================
        location /health {
            access_log off;
            proxy_pass http://192.168.2.56:8080/health;
        }

        # ======================================
        # ROOT - Redirige a /agildent
        # ======================================
        location = / {
            return 301 http://$server_name/agildent/;
        }

        # Bloquea archivos ocultos
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
