events {
    worker_connections 1024;
}

http {
    # Development Configuration - HTTP only, local testing
    server {
        listen 80;
        server_name localhost;

        # Disable access logs in development
        access_log off;
        error_log /var/log/nginx/error.log warn;

        # AgilDent Frontend and Backend
        location /agildent/ {
            # Proxy to frontend (Next.js) - strip /agildent, Next.js has basePath=/agildent
            proxy_pass http://frontend:3000/;
            proxy_http_version 1.1;

            # Headers for proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings for streaming
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # API Routes - Forward to Backend
        location /agildent/api/ {
            # Proxy to backend (FastAPI)
            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;

            # Headers for proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Important for API endpoints
            proxy_set_header X-Forwarded-Path /agildent/api;

            # WebSocket support (for real-time features)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # For file uploads
            client_max_body_size 50M;
        }

        # Health check endpoints (internal)
        location /health {
            access_log off;
            proxy_pass http://backend:8000/health;
        }

        # Root path - redirect to /agildent
        location = / {
            return 301 http://$server_name/agildent/;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
