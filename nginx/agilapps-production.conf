# ============================================
# AGILDENT - Nginx Proxy Reverso para agilapps.com
# ============================================
# Copia este bloque a tu nginx externo (agilapps.com)
#
# Frontend interno: http://192.168.2.56:8443
# Backend interno:  http://192.168.2.56:8080
# ============================================

server {
    listen 80;
    server_name agilapps.com;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name agilapps.com;

    # SSL Certificates (Let's Encrypt o los tuyos)
    ssl_certificate /etc/letsencrypt/live/agilapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agilapps.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/agilapps_access.log;
    error_log /var/log/nginx/agilapps_error.log;

    # -------------------------------------------
    # API ROUTES (debe ir ANTES del frontend)
    # https://agilapps.com/agildent/api/ -> http://192.168.2.56:8080/api/
    # -------------------------------------------
    location /agildent/api/ {
        proxy_pass http://192.168.2.56:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        client_max_body_size 50M;
    }

    # -------------------------------------------
    # FRONTEND ROUTES (Next.js)
    # https://agilapps.com/agildent/ -> http://192.168.2.56:8443/agildent/
    # -------------------------------------------
    location /agildent/ {
        proxy_pass http://192.168.2.56:8443/agildent/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
    }

    # -------------------------------------------
    # REDIRECT ROOT TO /agildent/
    # -------------------------------------------
    location = / {
        return 301 https://$server_name/agildent/;
    }

    # -------------------------------------------
    # CATCH /auth/* y redirigir a /agildent/auth/*
    # -------------------------------------------
    location /auth/ {
        return 301 https://$server_name/agildent$request_uri;
    }

    # Health check
    location /health {
        proxy_pass http://192.168.2.56:8080/health;
    }
}
