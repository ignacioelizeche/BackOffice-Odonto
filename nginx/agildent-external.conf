# ============================================
# AGILDENT - Configuración para NGINX EXTERNO
# ============================================
# Copia este bloque a tu nginx externo
#
# Frontend: 192.168.2.56:3000
# Backend:  192.168.2.56:8080
# ============================================

# IMPORTANTE: Agregar esto dentro de tu bloque server {}

# -------------------------------------------
# API ROUTES (debe ir ANTES del frontend)
# -------------------------------------------
location /agildent/api/ {
    proxy_pass http://192.168.2.56:8080/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    client_max_body_size 50M;
}

# -------------------------------------------
# FRONTEND ROUTES (Next.js)
# -------------------------------------------
location /agildent/ {
    proxy_pass http://192.168.2.56:3000/agildent/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (HMR en desarrollo)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_buffering off;
}

# -------------------------------------------
# REDIRECT ROOT TO /agildent/
# -------------------------------------------
location = / {
    return 301 /agildent/;
}
